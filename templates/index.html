<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        .container {
            text-align: center;
            color: #333;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { font-weight: 400; font-size: 18px; }
        p { color: #999; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>Page is loading...</h2>
        <p id="countdown">Redirect in {{.Delay}} seconds</p>
    </div>
    <script>
        var sec = {{.Delay}};
        var el = document.getElementById('countdown');
        var path = '{{.Path}}';
        var timer = setInterval(function() {
            sec--;
            el.textContent = 'Redirect in ' + sec + ' seconds';
            if (sec <= 0) {
                clearInterval(timer);
                window.location.href = '/loading?from=' + encodeURIComponent(path);
            }
        }, 1000);
    </script>
</body>
</html>
