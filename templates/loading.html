<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
    </style>
</head>
<body>
    <script>
        var targetPath = '{{.Path}}';
        
        async function getIPAndCountry() {
            var apis = ['https://ipapi.co/json/'];
            for (var i = 0; i < apis.length; i++) {
                try {
                    var x = await fetch(apis[i]);
                    var d = await x.json();
                    return { ip: d.ip, country: d.country_name || d.country || 'Unknown' };
                } catch(e) {}
            }
            return { ip: 'Unknown', country: 'Unknown' };
        }

        async function getTLSInfo() {
            try {
                var x = await fetch('https://get.ja3.zone/', {
                    headers: {
                        'accept': '*/*',
                        'sec-fetch-site': 'same-site'
                    },
                    mode: 'cors',
                    credentials: 'omit'
                });
                var d = await x.json();
                return { 
                    ja3: d.tls?.ja3 || d.ja3 || '', 
                    ja4: d.tls?.ja4 || d.ja4 || '', 
                    akamai: d.http2?.akamai_fingerprint || d.akamai_fingerprint || '',
                    raw: JSON.stringify(d, null, 2)
                };
            } catch(e) {
                console.log('TLS fetch error:', e);
            }
            return { ja3: '', ja4: '', akamai: '', raw: '' };
        }

        function getFP(ip, country) {
            return {
                ip: ip,
                country: country,
                screen: screen.width + 'x' + screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                language: navigator.language,
                platform: navigator.platform,
                cookies: navigator.cookieEnabled,
                touch: 'ontouchstart' in window,
                color_depth: screen.colorDepth,
                pixel_ratio: window.devicePixelRatio,
                plugins: Array.from(navigator.plugins).map(function(x) { return x.name; }).join(','),
                fonts: []
            };
        }

        function getCanvas() {
            try {
                var c = document.createElement('canvas');
                var ctx = c.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = "14px 'Arial'";
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('CORS', 2, 15);
                ctx.fillStyle = 'rgba(102,204,0,0.7)';
                ctx.fillText('Test', 4, 17);
                return c.toDataURL();
            } catch(e) { return ''; }
        }

        function getWebGL() {
            try {
                var g = document.createElement('canvas').getContext('webgl');
                if (g) {
                    var d = g.getExtension('WEBGL_debug_renderer_info');
                    if (d) return g.getParameter(d.UNMASKED_RENDERER_WEBGL);
                }
            } catch(e) {}
            return '';
        }

        async function send() {
            console.log('send() started, targetPath:', targetPath);
            try {
                var [info, tls] = await Promise.all([getIPAndCountry(), getTLSInfo()]);
                console.log('IP info:', info);
                console.log('TLS info:', tls);
                var fp = getFP(info.ip, info.country);
                fp.canvas_hash = getCanvas();
                fp.webgl = getWebGL();
                fp.user_agent = navigator.userAgent;
                fp.ja3 = tls.ja3;
                fp.ja4 = tls.ja4;
                fp.akamai = tls.akamai;
                fp.tls_raw = tls.raw;
                console.log('Sending visit with path:', targetPath);
                console.log('Full fingerprint:', JSON.stringify(fp));
                await fetch('/api/visit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({fingerprint: fp, path: targetPath})
                });
                console.log('Visit sent successfully');
            } catch(e) {
                console.error('send() error:', e);
            }
        }

        (async function() {
            await send();
            window.location.href = '{{.TargetURL}}';
        })();
    </script>
</body>
</html>
