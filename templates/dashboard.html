<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 20px; color: #333; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #2196F3; }
        .stat-card.crawler .number { color: #ff9800; }
        .stat-card.today .number { color: #4caf50; }
        .stat-card .label { font-size: 14px; color: #666; margin-top: 5px; }
        .section { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .section h3 { margin-bottom: 15px; color: #333; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background: #f8f9fa; font-weight: 600; color: #333; }
        tr:hover { background: #f8f9fa; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
        .badge.success { background: #e8f5e9; color: #4caf50; }
        .badge.warning { background: #fff3e0; color: #ff9800; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: 10px; }
        .btn-danger { background: #f44336; color: white; }
        .btn-secondary { background: #9e9e9e; color: white; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .loading { text-align: center; padding: 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>访客系统</h1>
        <div>
            <button onclick="loadData()" class="btn" style="background:#667eea;color:white;margin-right:10px">刷新</button>
            <form action="/adm/reset" method="post" onsubmit="return confirm('确定要重置所有数据吗？')" style="display:inline">
                <button type="submit" class="btn btn-danger">重置数据</button>
            </form>
        </div>
    </div>
    <div class="container">
        <div class="stats-row">
            <div class="stat-card">
                <div class="number" id="realUsers">-</div>
                <div class="label">真实用户</div>
            </div>
            <div class="stat-card crawler">
                <div class="number" id="crawlers">-</div>
                <div class="label">爬虫</div>
            </div>
            <div class="stat-card today">
                <div class="number" id="logCount">-</div>
                <div class="label">访问记录</div>
            </div>
            <div class="stat-card">
                <div class="number" id="uniqueIPs">-</div>
                <div class="label">独立IP</div>
            </div>
        </div>

        <div class="section">
            <h3>跳转配置 <span id="targetUrl" style="font-size:12px;color:#999;font-weight:normal"></span></h3>
            <form action="/adm/updateTarget" method="post" style="margin-top:15px;display:flex;gap:10px">
                <input type="text" name="target_url" id="targetInput" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px">
                <button type="submit" class="btn" style="background:#667eea;color:white">保存</button>
            </form>
        </div>

        <div class="section">
            <h3>历史统计 <span style="font-size:12px;color:#999;font-weight:normal">按日期统计</span></h3>
            <table>
                <thead><tr><th>日期</th><th>访问量</th><th>独立IP</th><th>爬虫</th></tr></thead>
                <tbody id="historyBody"><tr><td colspan="4" class="loading">加载中...</td></tr></tbody>
            </table>
        </div>

        <div class="section">
            <h3>访问日志 <span style="font-size:12px;color:#999;font-weight:normal">最近1000条记录</span></h3>
            <div style="max-height:400px;overflow-y:auto;">
            <table style="font-size:12px">
                <thead><tr style="background:#f8f9fa"><th style="padding:6px 8px">时间</th><th style="padding:6px 8px">IP</th><th style="padding:6px 8px">国家</th><th style="padding:6px 8px">类型</th><th style="padding:6px 8px">路径</th></tr></thead>
                <tbody id="logsBody"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody>
            </table>
            </div>
            <div class="actions"></div>
        </div>
    </div>

    <div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000">
        <div style="background:white;margin:50px auto;width:600px;max-height:80%;border-radius:8px;display:flex;flex-direction:column">
            <div style="padding:15px 20px;border-bottom:1px solid #eee;flex-shrink:0">
                <h3 style="margin:0;float:left">访问详情</h3>
                <span onclick="closeModal()" style="cursor:pointer;font-size:24px;float:right">&times;</span>
                <div style="clear:both"></div>
            </div>
            <div id="modalContent" style="padding:20px;overflow-y:auto;flex:1;max-height:calc(80vh - 60px)"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script>
        async function loadData() {
            try {
                const resp = await fetch('/api/stats');
                const data = await resp.json();
                
                document.getElementById('realUsers').textContent = data.RealUsers;
                document.getElementById('crawlers').textContent = data.Crawlers;
                document.getElementById('logCount').textContent = data.Logs ? data.Logs.length : 0;
                document.getElementById('uniqueIPs').textContent = data.UniqueIPs;
                document.getElementById('targetUrl').textContent = '当前目标: ' + DOMPurify.sanitize(data.TargetURL);
                document.getElementById('targetInput').value = DOMPurify.sanitize(data.TargetURL);

                let historyHtml = '';
                if (data.History && data.History.length > 0) {
                    data.History.forEach(h => {
                        historyHtml += '<tr>';
                        ['Date', 'Count', 'UniqueIPs', 'Crawlers'].forEach(k => {
                            historyHtml += '<td>' + DOMPurify.sanitize(h[k] ?? '') + '</td>';
                        });
                        historyHtml += '</tr>';
                    });
                } else {
                    historyHtml = '<tr><td colspan="4" style="text-align:center;color:#999">暂无数据</td></tr>';
                }
                document.getElementById('historyBody').innerHTML = historyHtml;

                let logsHtml = '';
                if (data.Logs && data.Logs.length > 0) {
                    data.Logs.forEach(log => {
                        const type = log.is_crawler ? '<span class="badge warning">爬虫</span>' : '<span class="badge success">用户</span>';
                        const fp = log.fingerprint || {};
                        logsHtml += '<tr style="border-bottom:1px solid #eee;cursor:pointer" onclick="showModal(\''+btoa(unescape(encodeURIComponent(JSON.stringify(fp)))).replace(/'/g, "&#39;")+'\',\''+btoa(unescape(encodeURIComponent(JSON.stringify(log.headers||{})))).replace(/'/g, "&#39;")+'\',\''+btoa(unescape(encodeURIComponent(JSON.stringify({fingerprint_id: log.fingerprint_id, tls_raw: fp.tls_raw})))).replace(/'/g, "&#39;")+'\')">';
                        ['timestamp', 'ip', 'country'].forEach(k => {
                            logsHtml += '<td style="padding:4px 8px">' + DOMPurify.sanitize(log[k] || '') + '</td>';
                        });
                        logsHtml += '<td style="padding:4px 8px">'+type+'</td>';
                        logsHtml += '<td style="padding:4px 8px">'+DOMPurify.sanitize(log.path || '')+'</td>';
                        logsHtml += '</tr>';
                    });
                } else {
                    logsHtml = '<tr><td colspan="5" style="text-align:center;color:#999;padding:20px">暂无记录</td></tr>';
                }
                document.getElementById('logsBody').innerHTML = logsHtml;
            } catch(e) {
                console.error('Load data failed:', e);
            }
        }

        function showModal(fp64, headers64, extra64) {
            var fp = JSON.parse(decodeURIComponent(escape(atob(fp64))));
            var headers = JSON.parse(decodeURIComponent(escape(atob(headers64))));
            var extra = JSON.parse(decodeURIComponent(escape(atob(extra64))));
            var html = '<table style="font-size:13px">';
            var fields = [
                ['IP', 'ip'], ['国家', 'country'], ['Screen', 'screen'], ['Timezone', 'timezone'],
                ['Language', 'language'], ['Platform', 'platform'], ['Cookies', 'cookies'], ['Touch', 'touch'],
                ['ColorDepth', 'color_depth'], ['PixelRatio', 'pixel_ratio'], ['Plugins', 'plugins'],
                ['JA3', 'ja3'], ['JA4', 'ja4'], ['Akamai', 'akamai']
            ];
            var esc = function(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); };
            fields.forEach(([label, key]) => {
                var val = fp[key] || '';
                html += '<tr><td style="padding:4px 8px;font-weight:bold">'+DOMPurify.sanitize(label)+'</td><td style="padding:4px 8px;position:relative">'+DOMPurify.sanitize(val)+'<span class="copy-icon" data-value="'+esc(val)+'">📋</span></td></tr>';
            });
            var fpIdVal = extra.fingerprint_id || '';
            html += '<tr><td style="padding:4px 8px;font-weight:bold">FingerprintID</td><td style="padding:4px 8px;position:relative">'+DOMPurify.sanitize(fpIdVal)+'<span class="copy-icon" data-value="'+esc(fpIdVal)+'">📋</span></td></tr>';
            var uaVal = fp.user_agent || '';
            html += '<tr><td style="padding:4px 8px;font-weight:bold;vertical-align:top">UserAgent</td><td style="padding:4px 8px;word-break:break-all;position:relative">'+DOMPurify.sanitize(uaVal)+'<span class="copy-icon" data-value="'+esc(uaVal)+'">📋</span></td></tr>';
            var headersStr = Object.entries(headers).map(([k,v]) => k+': '+v).join('\n');
            html += '<tr><td style="padding:4px 8px;font-weight:bold;vertical-align:top">Headers</td><td style="padding:4px 8px;position:relative"><pre style="margin:0;font-size:11px;white-space:pre-wrap">'+DOMPurify.sanitize(headersStr)+'</pre><span class="copy-icon" data-value="'+esc(headersStr)+'">📋</span></td></tr>';
            html += '<tr><td colspan="2" style="padding:4px 8px;font-weight:bold;background:#f5f5f5">TLS Raw</td></tr>';
            var tlsRawVal = extra.tls_raw || '';
            html += '<tr><td colspan="2" style="padding:4px 8px;position:relative"><pre style="margin:0;font-size:11px;white-space:pre-wrap;word-break:break-all;max-width:550px">'+DOMPurify.sanitize(tlsRawVal)+'</pre><span class="copy-icon" data-value="'+esc(tlsRawVal)+'">📋</span></td></tr>';
            html += '</table>';
            html += '<style>.copy-icon{position:absolute;top:4px;right:8px;font-size:14px;color:#999;cursor:pointer;display:none}tr:hover .copy-icon{display:inline}.copy-icon:hover{color:#667eea}</style>';
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modalContent').querySelectorAll('.copy-icon').forEach(function(icon){
                icon.addEventListener('click', function(e){
                    e.stopPropagation();
                    var val = icon.getAttribute('data-value');
                    navigator.clipboard.writeText(val).then(function(){
                        icon.textContent = '✓';
                        setTimeout(function(){ icon.textContent = '📋'; }, 1000);
                    });
                });
            });
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        document.getElementById('modal').onclick = function(e) { if (e.target === this) closeModal(); }
        
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
